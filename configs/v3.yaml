run_config:
  stages: ["topology_finetune", "evaluate", "topology_evaluate"]
  seed: 47
  train_run_id: 20260308_002906
  topology_finetune_run_id: null
  adapt_run_id: null
  eval_run_id: null
  topology_eval_run_id: null
  load_checkpoint_path: null
  save_best_only: true

device_config:
  device: "cuda"
  ddp_enabled: true
  use_mixed_precision: true

data_config:
  benchmark:
    name: "PRING"
    root_dir: "data/PRING"
    species: "human"
    split_strategy: "BFS"
    processed_dir: "data/PRING/species_processed_data/human/BFS"
  embeddings:
    source: "esm3"
    cache_dir: "data/embeddings/esm3_1024"
  max_sequence_length: 1024
  dataloader:
    train_dataset: "data/PRING/species_processed_data/human/BFS/human_train_ppi.txt"
    valid_dataset: "data/PRING/species_processed_data/human/BFS/human_val_ppi.txt"
    test_dataset: "data/PRING/species_processed_data/human/BFS/human_test_ppi.txt"
    num_workers: 4
    pin_memory: true
    drop_last: true
    sampling:
      strategy: "ohem"
      warmup_epochs: 5
      pool_multiplier: 4
      cap_protein: 4

model_config:
  model: "v3"
  input_dim: 1536
  d_model: 512
  encoder_layers: 3
  cross_attn_layers: 3
  n_heads: 8
  mlp_head:
    hidden_dims: [512, 256, 128]
    dropout: 0.20
    activation: "gelu"
    norm: "layernorm"
  regularization:
    dropout: 0.10
    token_dropout: 0.10
    cross_attention_dropout: 0.10
    stochastic_depth: 0.10

training_config:
  epochs: 50
  batch_size: 32
  early_stopping_patience: 10
  monitor_metric: "auprc"
  logging:
    validation_metrics: ["auprc", "auroc", "f1", "accuracy"]
  optimizer:
    type: "adamw"
    lr: 0.0001
    beta1: 0.9
    beta2: 0.999
    eps: 1.0e-8
    weight_decay: 0.05
  scheduler:
    type: "onecycle"
    max_lr: 0.0001
    pct_start: 0.10
    div_factor: 25
    final_div_factor: 10000
    anneal_strategy: "cos"
  loss:
    type: "bce_with_logits"
    # topology_finetune reinterprets missing within-subgraph pairs as negatives,
    # so scratch runs need extra positive pressure and less target smoothing.
    pos_weight: 3.0
    label_smoothing: 0.0
  strategy:
    type: "none"
  domain_adaptation:
    enabled: false

topology_finetune:
  init_mode: "scratch"
  epochs: 30
  # Match the pairwise-train supervision scale:
  # ceil(85,824 train pairs / C(20, 2)) = ceil(85,824 / 190) = 452 subgraphs.
  subgraphs_per_epoch: 452
  validation_mode: "sampled"
  min_nodes: 20
  max_nodes: 20
  strategy: "mixed"
  pair_batch_size: 16
  decision_threshold:
    mode: "best_f1_on_valid"
  monitor_metric: "internal_val_graph_sim"
  early_stopping_patience: 5
  optimizer:
    lr: 3.0e-6
    weight_decay: 3.0e-3
  losses:
    # Scratch regime: keep topology as a weak structural prior until BCE learns
    # a usable pairwise scorer. Relative-density was dominating the old setup.
    alpha: 0.08
    beta: 0.03
    gamma: 0.02
    delta: 0.02
    histogram_sigma: 1.5
    degree_bins: 32
    clustering_bins: 48

evaluate:
  decision_threshold:
    mode: "best_f1_on_valid"
  metrics:
    - "auroc"
    - "auprc"
    - "accuracy"
    - "sensitivity"
    - "specificity"
    - "precision"
    - "recall"
    - "f1"
    - "mcc"

topology_evaluate:
  inference_batch_size: 32
  decision_threshold:
    mode: "best_f1_on_valid"
  save_pair_predictions: true
  report_baselines: "src/topology/baselines/pring_human_table2.json"
